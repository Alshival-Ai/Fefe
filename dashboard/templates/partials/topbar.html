<header class="topbar">
  <div class="brand">
    <div class="brand-mark">F</div>
    <div class="brand-text">
      <span class="brand-title">Fefe</span>
      <span class="brand-sub">Developer Enablement</span>
    </div>
  </div>
  <div class="topbar-actions">
    <label class="search">
      <span class="search-icon">⌕</span>
      <input type="search" placeholder="Search docs, incidents, runbooks" />
    </label>
    <button class="icon-btn" type="button">?</button>
    <button class="icon-btn" type="button">⚙</button>
    <label class="theme-switcher" aria-label="Light/Dark Mode">
      <input class="theme__toggle theme-switcher__input" type="checkbox" role="switch" name="theme" value="dark">
      <span class="theme-switcher__slider">
        <span class="theme-switcher__sun-moon">
          <span class="theme-switcher__sun-moon-core">
            <svg class="theme-switcher__moon-dot theme-switcher__moon-dot--1" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__moon-dot theme-switcher__moon-dot--2" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__moon-dot theme-switcher__moon-dot--3" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__light-ray theme-switcher__light-ray--1" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__light-ray theme-switcher__light-ray--2" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__light-ray theme-switcher__light-ray--3" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__cloud theme-switcher__cloud--dark theme-switcher__cloud--1" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__cloud theme-switcher__cloud--dark theme-switcher__cloud--2" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__cloud theme-switcher__cloud--dark theme-switcher__cloud--3" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__cloud theme-switcher__cloud--light theme-switcher__cloud--4" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__cloud theme-switcher__cloud--light theme-switcher__cloud--5" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
            <svg class="theme-switcher__cloud theme-switcher__cloud--light theme-switcher__cloud--6" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="50"></circle>
            </svg>
          </span>
        </span>
        <span class="theme-switcher__stars">
          <svg class="theme-switcher__star theme-switcher__star--1" viewBox="0 0 20 20">
            <path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path>
          </svg>
          <svg class="theme-switcher__star theme-switcher__star--2" viewBox="0 0 20 20">
            <path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path>
          </svg>
          <svg class="theme-switcher__star theme-switcher__star--3" viewBox="0 0 20 20">
            <path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path>
          </svg>
          <svg class="theme-switcher__star theme-switcher__star--4" viewBox="0 0 20 20">
            <path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path>
          </svg>
        </span>
      </span>
    </label>
    <div class="user-chip">
      <div class="avatar">JD</div>
      <div>
        <div class="user-name">Jordan Doe</div>
        <div class="user-role">Platform Lead</div>
      </div>
    </div>
  </div>
</header>
